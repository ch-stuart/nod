name: SleepNoise
options:
  bundleIdPrefix: com.ch-stuart.sleepnoise 
  deploymentTarget:
    iOS: "17.0"
targets:
  SleepNoise:
    type: application
    platform: iOS
    sources: SleepNoise
    settings:
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      DEVELOPMENT_TEAM: R47B3QRLST
    info:
      path: SleepNoise/Info.plist
      properties:
        UIBackgroundModes: [audio]
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
        CFBundleDisplayName: Nod
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
